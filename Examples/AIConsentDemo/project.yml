name: AIConsentDemo
options:
  bundleIdPrefix: com.natty2027
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
packages:
  AIConsentKit:
    path: ../..
targets:
  AIConsentDemo:
    type: application
    platform: iOS
    sources:
      - AIConsentDemo
    dependencies:
      - package: AIConsentKit
        product: AIConsentKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.natty2027.AIConsentDemo
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.0"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
